name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build React App
        run: npm run build
      - name: Deploy to cPanel
        uses: appleboy/ssh-action@v0.3.1
        with:
          host: ur9group.com
          username: urgroupc
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p public_html
            rsync -avz build/ your_username@your_server_ip:/home/your_username/public_html
